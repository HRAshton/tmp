---
- name: Install DNF repository management tools
  ansible.builtin.dnf:
    name: dnf-plugins-core
    state: present

- name: Install the official Docker CE repository
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/centos/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    owner: root
    group: root
    mode: "0644"

- name: Install Docker Engine and Compose plugin
  ansible.builtin.dnf:
    name: "{{ docker_engine_packages }}"
    state: "{{ 'latest' if docker_engine_upgrade_enabled | bool else 'present' }}"
    update_cache: true
  notify: Restart Docker

- name: Configure the Docker daemon
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: "{{ docker_engine_daemon_config | to_nice_json }}\n"
    owner: root
    group: root
    mode: "0644"
    validate: /usr/bin/dockerd --validate --config-file=%s
  notify: Restart Docker

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Apply Docker handlers before deploying agents
  ansible.builtin.meta: flush_handlers
