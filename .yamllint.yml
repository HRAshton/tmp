---
extends: default

ignore: |
  .cache/

rules:
  braces:
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  empty-lines:
    max-end: 1
  line-length:
    max: 100
    level: warning
  octal-values:
    forbid-explicit-octal: true
    forbid-implicit-octal: true
  truthy:
    allowed-values: ["true", "false"]
